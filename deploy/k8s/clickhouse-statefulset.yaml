# ClickHouse StatefulSet - 2 副本集群
# 使用 ClickHouse 原生复制表引擎（ReplicatedMergeTree）实现数据冗余
# 生产环境推荐使用 clickhouse-operator 简化集群管理
apiVersion: v1
kind: Service
metadata:
  name: clickhouse
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: timeseries-db
spec:
  ports:
    - name: http-clickhouse
      port: 8123
      targetPort: 8123
      protocol: TCP
    - name: tcp-clickhouse
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: timeseries-db
  clusterIP: None
---
# 客户端访问入口（负载均衡到各副本）
apiVersion: v1
kind: Service
metadata:
  name: clickhouse-client
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: timeseries-db
spec:
  ports:
    - name: http-clickhouse
      port: 8123
      targetPort: 8123
      protocol: TCP
    - name: tcp-clickhouse
      port: 9000
      targetPort: 9000
      protocol: TCP
  selector:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: timeseries-db
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: clickhouse
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: clickhouse
    app.kubernetes.io/component: timeseries-db
    app.kubernetes.io/part-of: rpki-platform
spec:
  serviceName: clickhouse
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: clickhouse
      app.kubernetes.io/component: timeseries-db
  podManagementPolicy: OrderedReady
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clickhouse
        app.kubernetes.io/component: timeseries-db
        app.kubernetes.io/part-of: rpki-platform
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: clickhouse
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 60
      containers:
        - name: clickhouse
          image: clickhouse/clickhouse-server:24.1-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-clickhouse
              containerPort: 8123
              protocol: TCP
            - name: tcp-clickhouse
              containerPort: 9000
              protocol: TCP
          env:
            - name: CLICKHOUSE_DB
              valueFrom:
                configMapKeyRef:
                  name: rpki-platform-config
                  key: CLICKHOUSE_DB
            - name: CLICKHOUSE_USER
              valueFrom:
                configMapKeyRef:
                  name: rpki-platform-config
                  key: CLICKHOUSE_USER
            - name: CLICKHOUSE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: rpki-platform-secrets
                  key: CLICKHOUSE_PASSWORD
            - name: CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT
              value: "1"
            - name: TZ
              valueFrom:
                configMapKeyRef:
                  name: rpki-platform-config
                  key: TZ
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"
          volumeMounts:
            - name: clickhouse-data
              mountPath: /var/lib/clickhouse
            - name: clickhouse-logs
              mountPath: /var/log/clickhouse-server
          # 副本配置通过 ConfigMap 挂载，启用 ReplicatedMergeTree
          # ZooKeeper/Keeper 用于副本协调（此处省略，生产环境需单独部署）
          readinessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /ping
              port: 8123
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
          securityContext:
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
      securityContext:
        fsGroup: 101
  volumeClaimTemplates:
    - metadata:
        name: clickhouse-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 100Gi
        # storageClassName: fast-ssd
    - metadata:
        name: clickhouse-logs
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
