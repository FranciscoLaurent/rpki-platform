# Kubernetes Secrets 占位定义
# 注意：此处仅用于演示与开发环境，生产环境务必使用外部密钥管理方案
# 推荐：Sealed Secrets / External Secrets Operator / HashiCorp Vault
# 部署前请将 <PLACEHOLDER> 替换为实际的 base64 编码值
# 生成方式示例：echo -n 'mypassword' | base64
apiVersion: v1
kind: Secret
metadata:
  name: rpki-platform-secrets
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: rpki-platform
    app.kubernetes.io/component: secrets
type: Opaque
data:
  # PostgreSQL 密码（生产环境必须修改）
  POSTGRES_PASSWORD: <PLACEHOLDER_CHANGE_ME>
  POSTGRES_REPLICATION_PASSWORD: <PLACEHOLDER_CHANGE_ME>
  # Redis 密码
  REDIS_PASSWORD: <PLACEHOLDER_CHANGE_ME>
  # ClickHouse 密码
  CLICKHOUSE_PASSWORD: <PLACEHOLDER_CHANGE_ME>
  # 应用密钥（JWT 签名）
  SECRET_KEY: <PLACEHOLDER_CHANGE_ME>
  # 数据库连接串（包含密码，自动拼接使用）
  DATABASE_URL: <PLACEHOLDER_CHANGE_ME>
  # Redis 完整 URL
  REDIS_URL: <PLACEHOLDER_CHANGE_ME>
---
# Kafka 内部通信使用的 SASL/SSL 凭据（如启用）
apiVersion: v1
kind: Secret
metadata:
  name: kafka-secrets
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: secrets
type: Opaque
data:
  KAFKA_SASL_USERNAME: <PLACEHOLDER_CHANGE_ME>
  KAFKA_SASL_PASSWORD: <PLACEHOLDER_CHANGE_ME>
  KAFKA_SSL_CA: <PLACEHOLDER_CHANGE_ME>
  KAFKA_SSL_CERT: <PLACEHOLDER_CHANGE_ME>
  KAFKA_SSL_KEY: <PLACEHOLDER_CHANGE_ME>
