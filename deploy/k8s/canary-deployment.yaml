# 灰度发布 Deployment 配置
# 与稳定版 backend Deployment 并行部署，通过 Ingress canary 注解路由部分流量
# 配合 ingress.yaml 中的 rpki-platform-canary-ingress 使用
# 流量切量方式：
#   1. 按权重：canary-weight 注解（0-100）
#   2. 按 Header：canary-by-header（X-Canary: true）
#   3. 按 Cookie：canary-by-cookie
apiVersion: v1
kind: Service
metadata:
  name: backend-canary
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/variant: canary
spec:
  ports:
    - name: http-backend
      port: 8000
      targetPort: 8000
      protocol: TCP
  selector:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/variant: canary
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-canary
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: backend
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: rpki-platform
    app.kubernetes.io/variant: canary
  annotations:
    # 灰度发布元信息
    rpki.io/canary: "true"
    rpki.io/canary-weight: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: backend
      app.kubernetes.io/component: api
      app.kubernetes.io/variant: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: backend
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: rpki-platform
        app.kubernetes.io/variant: canary
      annotations:
        # Prometheus 采集标注（如启用）
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: backend
                    app.kubernetes.io/variant: canary
                topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 60
      containers:
        - name: backend
          # 灰度镜像版本（与稳定版不同，用于验证新版本）
          image: rpki-platform/backend:canary
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-backend
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: rpki-platform-config
            - configMapRef:
                name: backend-config
            - secretRef:
                name: rpki-platform-secrets
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: DEPLOYMENT_VARIANT
              value: "canary"
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 10"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
---
# 前端灰度 Deployment（可选）
apiVersion: v1
kind: Service
metadata:
  name: frontend-canary
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/variant: canary
spec:
  ports:
    - name: http-frontend
      port: 80
      targetPort: 80
      protocol: TCP
  selector:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/variant: canary
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-canary
  namespace: rpki-platform
  labels:
    app.kubernetes.io/name: frontend
    app.kubernetes.io/component: web
    app.kubernetes.io/part-of: rpki-platform
    app.kubernetes.io/variant: canary
  annotations:
    rpki.io/canary: "true"
    rpki.io/canary-weight: "20"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
      app.kubernetes.io/component: web
      app.kubernetes.io/variant: canary
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: frontend
        app.kubernetes.io/component: web
        app.kubernetes.io/part-of: rpki-platform
        app.kubernetes.io/variant: canary
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: rpki-platform/frontend:canary
          imagePullPolicy: IfNotPresent
          ports:
            - name: http-frontend
              containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "nginx -s quit; sleep 5"
