# 生产环境 docker-compose 配置
# 使用方式：docker-compose -f docker-compose.prod.yml up -d
# 注意：生产环境请务必修改所有默认密码与密钥

version: "3.9"

services:
  # PostgreSQL 16 数据库（生产）
  postgres:
    image: postgres:16-alpine
    container_name: rpki-postgres-prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rpki}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?请设置 POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-rpki_platform}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rpki} -d ${POSTGRES_DB:-rpki_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis 7 缓存（生产）
  redis:
    image: redis:7-alpine
    container_name: rpki-redis-prod
    restart: always
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:?请设置 REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Zookeeper（生产）
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: rpki-zookeeper-prod
    restart: always
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Kafka 消息队列（生产）
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: rpki-kafka-prod
    restart: always
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_NUM_PARTITIONS: 6
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ClickHouse 时序数据库（生产）
  clickhouse:
    image: clickhouse/clickhouse-server:24.1-alpine
    container_name: rpki-clickhouse-prod
    restart: always
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-rpki_platform}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?请设置 CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # 后端服务（生产）
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: rpki-backend-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_NAME: "RPKI 网络安全管理平台"
      DEBUG: "false"
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-rpki}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-rpki_platform}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CLICKHOUSE_URL: http://clickhouse:8123
      SECRET_KEY: ${SECRET_KEY:?请设置 SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "120"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # 前端服务（生产）
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: rpki-frontend-prod
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - rpki-prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  zookeeper-data:
    driver: local
  zookeeper-log:
    driver: local
  kafka-data:
    driver: local
  clickhouse-data:
    driver: local

networks:
  rpki-prod-network:
    driver: bridge
