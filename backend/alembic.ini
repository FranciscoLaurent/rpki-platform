# Alembic Configuration File

[alembic]
# Migration script directory
script_location = alembic

# Template path (includes version number and timestamp)
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Timezone
timezone = UTC

# Output timestamp format
output_encoding = utf-8

# Database URL (overridden by environment variable in env.py, this is a placeholder)
sqlalchemy.url = driver://user:pass@localhost/dbname

[post_write_hooks]
# Auto-format migration files with black
hooks = black
black.type = console_scripts
black.entrypoint = black
black.options = -l 100

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
